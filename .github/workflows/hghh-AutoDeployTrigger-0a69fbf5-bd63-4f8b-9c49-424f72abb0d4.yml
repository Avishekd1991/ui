name: Trigger auto deployment for hghh

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ master ]
    paths:
    - '**'
    - '.github/workflows/hghh-AutoDeployTrigger-0a69fbf5-bd63-4f8b-9c49-424f72abb0d4.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.HGHH_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.HGHH_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.HGHH_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.HGHH_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.HGHH_REGISTRY_PASSWORD }}
          containerAppName: hghh
          resourceGroup: rg
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


